name: Build iOS IPA
on: [workflow_dispatch] # Allows you to start it manually

jobs:
  build:
    runs-on: macos-latest # This is the "Free Mac" provided by GitHub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios

      - name: Build Unsigned IPA
        env:
          EXPO_PUBLIC_GOLD_API_LATEST: ${{ secrets.EXPO_PUBLIC_GOLD_API_LATEST }}
          EXPO_PUBLIC_GOLD_API_HISTORY: ${{ secrets.EXPO_PUBLIC_GOLD_API_HISTORY }}
          EXPO_PUBLIC_GOLD_API_WS: ${{ secrets.EXPO_PUBLIC_GOLD_API_WS }}
          EXPO_PUBLIC_WEB_CORS_PROXY: ${{ secrets.EXPO_PUBLIC_WEB_CORS_PROXY }}
        run: |
          # 1. Correctly identify the workspace and scheme name
          WORKSPACE=$(ls -d ios/*.xcworkspace)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          echo "Building Workspace: $WORKSPACE"
          echo "Detected Scheme: $SCHEME"

          # 2. Run the build using the detected scheme
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive -archivePath ./build.xcarchive

          # 3. Package the .app into a .ipa file
          mkdir -p Payload
          cp -r ./build.xcarchive/Products/Applications/*.app ./Payload
          zip -r app.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-native-app
          path: app.ipa
